<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle with primary green -->
  <circle cx="32" cy="32" r="30" fill="#58cc02"/>
  
  <!-- Book/Learning icon -->
  <g fill="white">
    <!-- Open book base -->
    <path d="M16 20 L32 24 L48 20 L48 44 L32 48 L16 44 Z" fill="white" opacity="0.9"/>
    
    <!-- Book spine/center -->
    <path d="M32 24 L32 48" stroke="#3ea500" stroke-width="2" fill="none"/>
    
    <!-- Left page lines -->
    <line x1="20" y1="28" x2="29" y2="30" stroke="#58cc02" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="33" x2="29" y2="35" stroke="#58cc02" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="38" x2="29" y2="40" stroke="#58cc02" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Right page lines -->
    <line x1="35" y1="30" x2="44" y2="28" stroke="#58cc02" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="35" y1="35" x2="44" y2="33" stroke="#58cc02" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="35" y1="40" x2="44" y2="38" stroke="#58cc02" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Graduation cap on top -->
    <polygon points="32,12 22,18 32,22 42,18" fill="white"/>
    <rect x="30" y="18" width="4" height="4" fill="white"/>
    <circle cx="42" cy="22" r="1.5" fill="white"/>
    <line x1="42" y1="18" x2="42" y2="22" stroke="white" stroke-width="1"/>
  </g>
</svg>
