<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- LearnLab Logo — Graph nodes forming learning paths -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  
  <!-- Graph edges (learning paths) -->
  <line x1="20" y1="16" x2="20" y2="32" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="20" y1="32" x2="20" y2="46" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="20" y1="46" x2="34" y2="46" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="34" y1="46" x2="46" y2="46" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Discovery path edges (violet) -->
  <line x1="20" y1="32" x2="34" y2="24" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="34" y1="24" x2="46" y2="16" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Primary nodes (white — main path) -->
  <circle cx="20" cy="16" r="5" fill="white"/>
  <circle cx="20" cy="32" r="5" fill="white"/>
  <circle cx="20" cy="46" r="5" fill="white"/>
  <circle cx="34" cy="46" r="5" fill="white"/>
  <circle cx="46" cy="46" r="4" fill="#f59e0b"/>
  
  <!-- Discovery nodes (violet — branching paths) -->
  <circle cx="34" cy="24" r="3.5" fill="#a78bfa"/>
  <circle cx="46" cy="16" r="3" fill="#a78bfa" opacity="0.7"/>
</svg>
